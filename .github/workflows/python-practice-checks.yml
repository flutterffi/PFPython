name: Python Practice Checks

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all files
        run: PYTHONPYCACHEPREFIX=.pycache python3 -m compileall foundations core_python standard_library engineering advanced packaging interview projects tests modules pfpython tools

      - name: Run repository verification
        run: PYTHONPYCACHEPREFIX=.pycache python3 tools/run_everything.py
